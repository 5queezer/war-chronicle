# Pre-commit hooks for war-chronicle (Hugo / Markdown / TOML)
# Install: pre-commit install
# Run manually: pre-commit run --all-files
#
# NOTE: A Gemini API key was previously committed here. Gitleaks is the
# primary guard against that happening again.

default_stages: [pre-commit]

repos:
  # ── Secrets & security ───────────────────────────────────────────────────
  - repo: local
    hooks:
      - id: gitleaks
        name: gitleaks (secrets scan)
        language: system
        entry: gitleaks protect --staged --redact
        pass_filenames: false

  # ── General file hygiene ─────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: detect-private-key
      - id: check-added-large-files
        args: ["--maxkb=2048"]   # 2 MB — reasonable for Hugo images; videos/large assets should be in CDN
      - id: check-merge-conflict
      - id: end-of-file-fixer
        exclude: "^public/"      # Hugo build output (gitignored, but just in case)
      - id: trailing-whitespace
        exclude: "^public/"
      - id: check-json
      - id: check-yaml
      - id: check-toml

  # ── Image Rights QA ─────────────────────────────────────────────────────
  - repo: local
    hooks:
      - id: image-rights-qa
        name: Image rights QA (no paid sources, attribution required)
        language: python
        entry: python3 scripts/image_qa.py
        pass_filenames: false
        types: [markdown]
        additional_dependencies: []

  # ── Markdown quality ─────────────────────────────────────────────────────
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.43.0
    hooks:
      - id: markdownlint
        args:
          - "--disable"
          - "MD013"   # line-length — Hugo content can have long lines
          - "MD033"   # inline HTML — Hugo shortcodes often embed HTML
          - "--"
        types: [markdown]
        exclude: "^themes/"   # don't lint vendored theme markdown
