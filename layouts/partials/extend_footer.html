<!-- GLightbox — image zoom for post images -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/glightbox/dist/css/glightbox.min.css">
<script src="https://cdn.jsdelivr.net/npm/glightbox/dist/js/glightbox.min.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function () {
  // Wrap unwrapped <img> tags in the post content with lightbox anchors
  document.querySelectorAll('.post-content img, article img').forEach(function (img) {
    if (img.closest('a')) return; // already linked
    if (img.closest('.mermaid')) return; // mermaid has its own zoom
    var a = document.createElement('a');
    a.href = img.src;
    a.className = 'glightbox';
    a.setAttribute('data-title', img.alt || '');
    img.parentNode.insertBefore(a, img);
    a.appendChild(img);
  });
  if (typeof GLightbox !== 'undefined') {
    GLightbox({ touchNavigation: true, loop: false, zoomable: true });
  }
});
</script>
<style>
/* Post images — full width, zoom cursor */
.post-content img, article img {
  max-width: 100%;
  width: 100%;
  cursor: zoom-in;
  border-radius: 4px;
  transition: opacity 0.2s ease;
  display: block;
  margin: 1rem 0;
}
.post-content img:hover, article img:hover {
  opacity: 0.88;
}
</style>

<script>
document.querySelectorAll('.menu__trigger').forEach(function(trigger) {
  trigger.addEventListener('click', function(e) {
    e.stopPropagation();
  });
});
</script>
<script>
(function () {
  // Create the overlay once
  var overlay = document.createElement('div');
  overlay.className = 'mermaid-overlay';
  document.body.appendChild(overlay);

  overlay.addEventListener('click', function () {
    overlay.classList.remove('active');
    overlay.innerHTML = '';
  });

  // Close on Escape key
  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape') {
      overlay.classList.remove('active');
      overlay.innerHTML = '';
    }
  });

  function wrapMermaidSvg(svg) {
    if (svg.closest('.mermaid-wrapper')) return; // already wrapped
    var wrapper = document.createElement('div');
    wrapper.className = 'mermaid-wrapper';
    wrapper.title = 'Click to zoom';
    svg.parentNode.insertBefore(wrapper, svg);
    wrapper.appendChild(svg);

    wrapper.addEventListener('click', function () {
      var clone = svg.cloneNode(true);
      // Remove fixed dimensions so the clone fills the overlay naturally
      clone.removeAttribute('width');
      clone.removeAttribute('height');
      clone.style.width = '';
      clone.style.height = '';
      overlay.innerHTML = '';
      overlay.appendChild(clone);
      overlay.classList.add('active');
    });
  }

  // Mermaid renders async; use MutationObserver to catch SVGs as they appear
  function observeMermaid() {
    // Wrap any already-rendered SVGs first
    document.querySelectorAll('.mermaid svg').forEach(wrapMermaidSvg);

    // Then watch for new ones (Mermaid replaces .mermaid content with <svg>)
    var observer = new MutationObserver(function (mutations) {
      mutations.forEach(function (mutation) {
        mutation.addedNodes.forEach(function (node) {
          if (node.nodeType !== 1) return;
          if (node.tagName === 'svg' && node.closest && node.closest('.mermaid')) {
            wrapMermaidSvg(node);
          }
          // Also check descendants
          node.querySelectorAll && node.querySelectorAll('.mermaid svg').forEach(wrapMermaidSvg);
        });
      });
    });

    observer.observe(document.body, { childList: true, subtree: true });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', observeMermaid);
  } else {
    observeMermaid();
  }
})();
</script>
