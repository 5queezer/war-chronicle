baseURL = "https://war.vasudev.xyz/"
theme = "terminal"
defaultContentLanguage = "en"

[pagination]
  pagerSize = 10

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[params]
  contentTypeName = "posts"
  themeColor = "green"
  showMenuItems = 3
  fullWidthTheme = false
  centerTheme = true
  showLanguageSelector = true

[taxonomies]
  tag = "tags"
  category = "categories"

[languages]
  [languages.en]
    languageName = "EN"
    weight = 1
    contentDir = "content/en"
    title = "War Chronicle 2026"
    subtitle = "Iran / USA / Israel — Daily Intelligence Log"
    keywords = "Iran, USA, Israel, war, prophecy"
    copyright = ""
    menuMore = "More"
    readMore = "Read more"
    readOtherPosts = "Read other posts"
    newerPosts = "Newer"
    olderPosts = "Older"
    missingContentMessage = "Not found."
    missingBackButtonLabel = "Back"
    minuteReadingTime = "min read"
    words = "words"
    [languages.en.params.logo]
      logoText = "WAR-CHRONICLE"
      logoHomeLink = "/en/"
    [[languages.en.menu.main]]
      identifier = "search"
      name = "Search"
      url = "/en/search/"

  [languages.de]
